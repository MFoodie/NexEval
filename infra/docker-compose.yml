version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: nexeval-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nexeval
      MYSQL_USER: nexeval
      MYSQL_PASSWORD: nexeval123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: nexeval-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
